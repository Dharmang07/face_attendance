<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f7efe4;
            --bg-2: #d8e8e2;
            --ink: #102a43;
            --muted: #486581;
            --line: rgba(16, 42, 67, 0.14);
            --card: rgba(255, 255, 255, 0.84);
            --primary: #0f766e;
            --success: #0e9f6e;
            --danger: #b91c1c;
            --warn: #8a5a00;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 15% 10%, #fff6df 0%, transparent 38%),
                        radial-gradient(circle at 85% 5%, #d6eef4 0%, transparent 40%),
                        linear-gradient(130deg, var(--bg-1), var(--bg-2));
        }

        .page {
            width: min(1100px, 92vw);
            margin: 2rem auto;
        }

        .hero {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 1.2rem;
            padding: 1.2rem;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 18px 35px rgba(16, 42, 67, 0.08);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.3rem, 1.8vw, 1.8rem);
        }

        .sub {
            margin: 0.45rem 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .btn {
            border: 0;
            text-decoration: none;
            background: var(--primary);
            color: #fff;
            border-radius: 0.75rem;
            padding: 0.66rem 1rem;
            font-weight: 600;
            transition: transform 140ms ease, box-shadow 140ms ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(16, 42, 67, 0.15);
        }

        .card {
            margin-top: 1rem;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 1.1rem;
            overflow: hidden;
            box-shadow: 0 22px 38px rgba(16, 42, 67, 0.08);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th,
        td {
            text-align: left;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
            font-size: 0.92rem;
        }

        th {
            font-size: 0.78rem;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.75);
        }

        .pill {
            display: inline-block;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(14, 159, 110, 0.15);
            color: var(--success);
        }

        .empty {
            text-align: center;
            padding: 1.8rem 1rem;
            color: var(--muted);
        }

        @media (max-width: 840px) {
            .hero {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <div>
            <h1>AI Face Attendance Dashboard</h1>
            <p class="sub">Monitor attendance logs and run face scanning sessions.</p>
        </div>
        <a href="/start" class="btn">Start Attendance</a>
    </section>

    <section class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody>
                    {% if records %}
                        {% for row in records %}
                        <tr>
                            <td>{{ row.id }}</td>
                            <td>{{ row.name }}</td>
                            <td>{{ row.date }}</td>
                            <td><span class="pill">{{ row.time }}</span></td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4" class="empty">No attendance records available yet.</td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
