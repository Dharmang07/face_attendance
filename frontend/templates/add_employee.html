<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="page-shell">
    <section class="form-card">
        <h1>Add New Employee</h1>
        <p>Register employee details and upload one clear face image. Employee ID is generated automatically.</p>

        <form method="POST" enctype="multipart/form-data" class="employee-form">
            <div class="form-grid">
                <div class="field">
                    <label for="emp_name">Employee Name</label>
                    <input id="emp_name" class="text-input" type="text" name="emp_name" placeholder="Enter employee name" required>
                </div>

                <div class="field field-full">
                    <label for="image">Employee Image</label>
                    <div class="upload-box">
                        <input
                            id="image"
                            class="file-input"
                            type="file"
                            name="image"
                            accept="image/*"
                            required
                            data-image-input
                        >
                        <div class="file-name" data-file-name>No image selected</div>
                        <div class="preview-box">
                            <img src="" alt="Selected employee preview" data-image-preview hidden>
                            <div class="preview-placeholder" data-preview-placeholder>
                                Choose a clear face image to preview it here before saving.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Add Employee</button>
                <a href="/dashboard" class="btn btn-outline">Back to Dashboard</a>
            </div>
        </form>
    </section>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
