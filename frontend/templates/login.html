<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f7efe4;
            --bg-2: #d8e8e2;
            --ink: #102a43;
            --muted: #486581;
            --line: rgba(16, 42, 67, 0.15);
            --card: rgba(255, 255, 255, 0.86);
            --primary: #0f766e;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 12% 10%, #fff6df 0%, transparent 36%),
                        radial-gradient(circle at 88% 4%, #d6eef4 0%, transparent 40%),
                        linear-gradient(130deg, var(--bg-1), var(--bg-2));
            padding: 1rem;
        }

        .card {
            width: min(420px, 94vw);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 1.2rem;
            padding: 1.5rem;
            box-shadow: 0 22px 45px rgba(16, 42, 67, 0.12);
            backdrop-filter: blur(10px);
            animation: rise 420ms ease-out;
        }

        h1 {
            margin: 0;
            font-size: 1.45rem;
        }

        .subtitle {
            margin: 0.45rem 0 1.2rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .field {
            margin-bottom: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.72rem 0.78rem;
            border-radius: 0.75rem;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            font: inherit;
            color: var(--ink);
            outline: none;
            transition: border-color 140ms ease, box-shadow 140ms ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
        }

        .actions {
            display: flex;
            gap: 0.65rem;
            margin-top: 1rem;
        }

        .btn {
            border: 0;
            border-radius: 0.75rem;
            padding: 0.7rem 0.95rem;
            font: inherit;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(16, 42, 67, 0.15);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            flex: 1;
        }

        .note {
            margin: 0.95rem 0 0;
            color: var(--muted);
            font-size: 0.82rem;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <form method="post" class="card">
        <h1>Admin Login</h1>
        <p class="subtitle">Sign in to access the attendance control panel.</p>

        <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" placeholder="Enter username" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit">Login</button>
        </div>

        <p class="note">Default setup uses admin credentials configured in Flask.</p>
    </form>
</body>
</html>
