<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="auth-shell">
        <form method="post" class="auth-card">
            <h1>Admin Login</h1>
            <p>Sign in to access the attendance control panel and launch recognition sessions.</p>

            <div class="meta-row">
                <span class="meta-chip">Face Recognition</span>
                <span class="meta-chip">Attendance Dashboard</span>
            </div>

            <div class="auth-form">
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" class="text-input" name="username" placeholder="Enter username" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" class="text-input" type="password" name="password" placeholder="Enter password" required>
                </div>

                <button class="btn btn-primary" type="submit">Login</button>
            </div>

            <p class="muted-note">Default setup uses the admin credentials configured in Flask.</p>
        </form>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
